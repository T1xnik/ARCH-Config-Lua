# ===================================================
# hyprlock.conf — экран блокировки (с логином)
# ===================================================

# Фон (обои)
background {
    path = /home/tixnik/Изображения/devushka_futbolka_zdaniia_904530_1920x1080.jpg
    blur_passes = 3
    blur_size = 7
}

# Часы
label {
    text = cmd[update:1000] echo "$(date +'%H:%M:%S')"
    color = rgba(255, 255, 255, 1.0)
    font_size = 48
    position = 0, 200
    halign = center
    valign = center
}

# Дата
label {
    text = cmd[update:86400000] echo "$(date +'%A, %B %d, %Y')"
    color = rgba(200, 200, 200, 1.0)
    font_size = 20
    position = 0, 140
    halign = center
    valign = center
}

# Имя пользователя (логин)
label {
    text = "Tixnik-Desctop"
    color = rgba(255, 255, 255, 0.9)
    font_size = 28
    position = 0, 70
    halign = center
    valign = center
}

# Поле ввода пароля
input-field {
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0.5)
    inner_color = rgba(0, 0, 0, 0.8)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = true
    placeholder_text = "Введите пароль..."
    position = 0, -150
    halign = center
    valign = center
}

# Кнопка смены пользователя
button {
    text = "Сменить пользователя"
    cmd = ~/.config/hypr/lock_button.sh
    color = rgba(255, 255, 255, 1.0)
    font_size = 16
    position = 0, -280
    halign = center
    valign = center
}
